spring:
  application:
    name: vitals_management

  datasource:
    url: jdbc:mysql://localhost:3306/vitals_management
    username: nyasha
    password: nyasha
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:/liquibase/db/master.xml

  main:
    allow-bean-definition-overriding: true

logging:
  level:
    org:
      axonframework: DEBUG
    io:
      grpc: DEBUG

axon:
  axonserver:
    enabled: false
    context: default

  handling:
    processors:
      lab-group: subscribing